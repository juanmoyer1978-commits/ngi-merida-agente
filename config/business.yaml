negocio:
  nombre: "NGI Mérida"
  nombre_completo: "Iglesia Cristiana Nueva Generación Internacional — NGI Mérida"
  descripcion: >
    Iglesia cristiana que sirve a familias, matrimonios y jóvenes con la visión de
    Evangelizar, Afirmar, Discipular y Enviar. Liderada bajo estructura apostólica
    con el Apóstol José Luis López Priego.
  lema: "Un cañonazo de amor nadie lo soporta"
  horario:
    servicios:
      - dia: "Domingo"
        horas: ["9:00 AM", "12:00 PM"]
      - dia: "Jueves"
        horas: ["7:00 PM"]
      - dia: "Viernes"
        horas: ["8:00 PM"]
agente:
  nombre: "Juan"
  tono: "amigable y casual"
  casos_de_uso:
    - "Responder preguntas frecuentes sobre la iglesia"
    - "Atender y orientar a nuevos visitantes"
    - "Conectar personas con grupos por zona"
    - "Soporte a miembros y familias"

metadata:
  creado: "2026-04-20"
  version: "1.0"
